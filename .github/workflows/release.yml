name: Release

# Trigger by pushing a version tag, e.g.:
#   (bump CFBundleShortVersionString in Resources/Info.plist first)
#   git tag v1.0.0 && git push origin v1.0.0
#
# Steps:
#   1. Build CronBar.app, sign with Developer ID, notarize, and staple.
#   2. Create a GitHub Release with the notarized zip attached.
#   3. Update the Homebrew cask (version + sha256) in Jacksunwei/homebrew-tap.
#
# Required repository secrets:
#   DEVELOPER_ID_CERT_P12       base64 of the exported "Developer ID Application"
#                               certificate (.p12, including its private key)
#   DEVELOPER_ID_CERT_PASSWORD  password used when exporting the .p12
#   APPLE_ID                    Apple ID email for notarization
#   APPLE_TEAM_ID               Developer Team ID (e.g. JXNAJH52AT)
#   APPLE_APP_PASSWORD          app-specific password for the Apple ID
#   HOMEBREW_TAP_TOKEN          token with contents:write on Jacksunwei/homebrew-tap

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Use latest Xcode (Swift 6)
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Show toolchain
        run: swift --version

      - name: Verify Info.plist version matches tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PLIST_VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" Resources/Info.plist)
          echo "tag=$VERSION  Info.plist=$PLIST_VERSION"
          if [ "$VERSION" != "$PLIST_VERSION" ]; then
            echo "::error::Tag ($VERSION) does not match Info.plist CFBundleShortVersionString ($PLIST_VERSION)"
            exit 1
          fi

      - name: Import Developer ID certificate
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/devid.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)

          echo "$CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 \
            -T /usr/bin/codesign -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | awk -F'"' '/Developer ID Application/{print $2; exit}')
          if [ -z "$IDENTITY" ]; then
            echo "::error::No Developer ID Application identity found in imported keychain"
            exit 1
          fi
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "Imported identity: $IDENTITY"

      - name: Build and sign app
        env:
          CODESIGN_IDENTITY: ${{ env.SIGN_IDENTITY }}
        run: ./scripts/build-app.sh

      - name: Notarize and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          ditto -c -k --keepParent CronBar.app notarize.zip
          xcrun notarytool submit notarize.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait
          xcrun stapler staple CronBar.app
          xcrun stapler validate CronBar.app
          spctl -a -vvv -t install CronBar.app

      - name: Package and checksum
        id: package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ditto -c -k --sequesterRsrc --keepParent CronBar.app CronBar.app.zip
          SHA=$(shasum -a 256 CronBar.app.zip | awk '{print $1}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "Built $VERSION  sha256=$SHA"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" CronBar.app.zip \
            --title "CronBar ${GITHUB_REF_NAME#v}" \
            --generate-notes

      - name: Update Homebrew tap cask
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.package.outputs.version }}
          SHA256: ${{ steps.package.outputs.sha256 }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set; skipping tap update."
            exit 0
          fi
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/Jacksunwei/homebrew-tap.git" tap
          CASK="tap/Casks/cronbar.rb"
          sed -i '' -E "s/^  version \".*\"/  version \"${VERSION}\"/" "$CASK"
          sed -i '' -E "s/^  sha256 \".*\"/  sha256 \"${SHA256}\"/" "$CASK"
          git -C tap \
            -c user.name="github-actions[bot]" \
            -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
            commit -am "Update cronbar to ${VERSION}"
          git -C tap push
